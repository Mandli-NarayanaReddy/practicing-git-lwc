<template>
    <lightning-card title="Create Account Record" icon-name="standard:account">
        <div class="slds-p-around_medium">

            <lightning-input 
                label="Enter Account Name" 
                value={accountName} 
                onchange={handleChange}>
            </lightning-input>

            <lightning-input 
                label="Enter Account Rating" 
                value={accountRating} 
                onchange={handleChange}>
            </lightning-input>

            <lightning-input 
                label="Enter Account Industry" 
                value={accountIndustry} 
                onchange={handleChange}>
            </lightning-input>

            <lightning-button 
                label="Create Account" 
                variant="brand" 
                onclick={handleClick}
                class="slds-m-top_medium">
            </lightning-button>

        </div>
    </lightning-card>
</template>
